<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denver Lore Night — Trivia Prep</title>
<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --surface2: #f3f1ec;
    --border: rgba(0,0,0,0.1);
    --border-med: rgba(0,0,0,0.18);
    --text: #1a1a17;
    --text-secondary: #6b6b63;
    --text-tertiary: #9a9a90;
    --accent: #c8410a;
    --accent-light: #fdf0ea;
    --success-bg: #eaf5e8;
    --success-text: #2a6e22;
    --danger-bg: #fdecea;
    --danger-text: #a32020;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181500;
      --bg: #1c1b18;
      --surface: #252420;
      --surface2: #2e2d29;
      --border: rgba(255,255,255,0.1);
      --border-med: rgba(255,255,255,0.18);
      --text: #f0efe9;
      --text-secondary: #a09e95;
      --text-tertiary: #6e6c64;
      --accent: #e05a1a;
      --accent-light: #2a1a0e;
      --success-bg: #0e2410;
      --success-text: #6bcf5e;
      --danger-bg: #250e0e;
      --danger-text: #f08080;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }
  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 20px 24px 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
  }
  .header-title h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-title p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .event-badge {
    font-size: 11px;
    font-weight: 600;
    background: var(--accent);
    color: #fff;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 2px;
  }
  .tabs {
    display: flex;
    gap: 0;
  }
  .tab-btn {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 0.15s;
  }
  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* FACTOIDS */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .filter-btn {
    padding: 5px 13px;
    font-size: 12px;
    font-weight: 500;
    border: 0.5px solid var(--border-med);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.12s;
  }
  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .category-section { margin-bottom: 28px; }
  .cat-heading {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
  }
  .fact-row {
    display: flex;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 13.5px;
    line-height: 1.55;
  }
  .fact-row:last-child { border-bottom: none; }
  .fact-key {
    font-weight: 600;
    color: var(--text);
    min-width: 160px;
    flex-shrink: 0;
  }
  .fact-val { color: var(--text-secondary); }

  /* QUIZ */
  .quiz-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .progress-info { font-size: 13px; color: var(--text-secondary); }
  .score-pill {
    font-size: 13px;
    font-weight: 600;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    color: var(--text);
  }
  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--surface2);
    border-radius: 3px;
    margin-bottom: 20px;
  }
  .progress-bar-fill {
    height: 3px;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }
  .q-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }
  .q-cat-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .answer-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .answer-input {
    flex: 1;
    padding: 9px 13px;
    font-size: 14px;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .answer-input:focus { border-color: var(--accent); }
  .reveal-btn {
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 600;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.12s;
  }
  .reveal-btn:hover { opacity: 0.88; }
  .answer-box {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 12px;
    display: none;
  }
  .answer-box.show { display: block; }
  .answer-box-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 5px;
  }
  .answer-box-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.55;
  }
  .grade-row {
    display: none;
    gap: 8px;
    margin-bottom: 4px;
  }
  .grade-row.show { display: flex; }
  .grade-btn {
    flex: 1;
    padding: 9px;
    font-size: 13px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.12s;
  }
  .grade-btn.got { background: var(--success-bg); color: var(--success-text); border-color: var(--success-text); }
  .grade-btn.missed { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-text); }
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nav-btn {
    padding: 9px 20px;
    font-size: 14px;
    font-weight: 500;
    border: 0.5px solid var(--border-med);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
  }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: var(--surface); }
  .shuffle-link {
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .done-screen {
    text-align: center;
    padding: 48px 20px;
    display: none;
  }
  .done-screen.show { display: block; }
  .done-score-num {
    font-size: 52px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }
  .done-score-label {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .done-message {
    font-size: 14px;
    color: var(--text-tertiary);
    margin-bottom: 28px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
  }
  .restart-btn {
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 700;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: opacity 0.12s;
  }
  .restart-btn:hover { opacity: 0.88; }

  @media (max-width: 520px) {
    .fact-key { min-width: 120px; font-size: 13px; }
    .fact-val { font-size: 13px; }
    .header-top { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">
      <h1>Denver Lore Night</h1>
      <p>Trivia prep — 100 questions, 10 categories</p>
    </div>
    <span class="event-badge">June 2, 2026</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('facts')">Factoids</button>
    <button class="tab-btn" onclick="showTab('quiz')">Practice quiz</button>
  </div>
</header>

<main>
  <div id="facts" class="tab-panel active">
    <div class="filter-row" id="fact-filters"></div>
    <div id="fact-body"></div>
  </div>

  <div id="quiz" class="tab-panel">
    <div id="quiz-active">
      <div class="filter-row" id="quiz-filters"></div>
      <div class="quiz-controls">
        <span class="progress-info" id="progress-text">Question 1 of 100</span>
        <span class="score-pill" id="score-display">Score: 0 / 0</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="q-card">
        <div class="q-cat-label" id="q-cat"></div>
        <div class="q-text" id="q-text"></div>
        <div class="answer-row">
          <input class="answer-input" id="answer-input" type="text" placeholder="Write your answer, then reveal…" />
          <button class="reveal-btn" onclick="revealAnswer()">Reveal</button>
        </div>
        <div class="answer-box" id="answer-box">
          <div class="answer-box-label">Answer</div>
          <div class="answer-box-text" id="answer-text"></div>
        </div>
        <div class="grade-row" id="grade-row">
          <button class="grade-btn got" onclick="grade(true)">✓ Got it</button>
          <button class="grade-btn missed" onclick="grade(false)">✗ Missed it</button>
        </div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Prev</button>
        <button class="shuffle-link" onclick="shuffleQ()">Shuffle deck</button>
        <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
      </div>
    </div>
    <div class="done-screen" id="done-screen">
      <div class="done-score-num" id="done-num"></div>
      <div class="done-score-label" id="done-label"></div>
      <div class="done-message" id="done-msg"></div>
      <button class="restart-btn" onclick="restartQuiz()">Try again</button>
    </div>
  </div>
</main>

  {cat:"Neighborhoods",q:"What Denver neighborhood is known as 'Restaurant Row' and where is it?",a:"The stretch of 17th Avenue in the Capitol Hill / Uptown area"},
  {cat:"Neighborhoods",q:"What neighborhood sits immediately east of downtown and is known for its arts and nightlife scene?",a:"Capitol Hill — sometimes called the most densely populated neighborhood in Colorado"},

  {cat:"Arts & Culture",q:"The Denver Performing Arts Complex contains how many venues, and what national ranking does it hold?",a:"Nine venues; it is the second largest performing arts complex in the nation"}
];

const CATS = [...new Set(ALL_Q.map(q => q.cat))];
const FACT_CATS = Object.keys(FACTS);

let activeFacts = new Set(FACT_CATS);
let activeQuizCats = new Set(CATS);
let filteredQ = [...ALL_Q];
let questions = [...ALL_Q];
let current = 0;
let scores = {};
let revealed = {};

function buildFactFilters() {
  const c = document.getElementById('fact-filters');
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = 'All';
  all.onclick = () => { activeFacts = new Set(FACT_CATS); renderFacts(); updateFactFilters(); };
  c.appendChild(all);
  FACT_CATS.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'filter-btn active';
    b.textContent = cat;
    b.onclick = () => {
      if (activeFacts.has(cat)) { if (activeFacts.size > 1) activeFacts.delete(cat); }
      else activeFacts.add(cat);
      renderFacts(); updateFactFilters();
    };
    c.appendChild(b);
  });
}

function updateFactFilters() {
  const btns = document.querySelectorAll('#fact-filters .filter-btn');
  btns[0].className = 'filter-btn' + (activeFacts.size === FACT_CATS.length ? ' active' : '');
  FACT_CATS.forEach((cat, i) => { btns[i + 1].className = 'filter-btn' + (activeFacts.has(cat) ? ' active' : ''); });
}

function renderFacts() {
  const body = document.getElementById('fact-body');
  body.innerHTML = '';
  FACT_CATS.filter(c => activeFacts.has(c)).forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'category-section';
    const h = document.createElement('div');
    h.className = 'cat-heading';
    h.textContent = cat;
    sec.appendChild(h);
    FACTS[cat].forEach(([key, val]) => {
      const row = document.createElement('div');
      row.className = 'fact-row';
      row.innerHTML = `<span class="fact-key">${key}</span><span class="fact-val">${val}</span>`;
      sec.appendChild(row);
    });
    body.appendChild(sec);
  });
}

function buildQuizFilters() {
  const c = document.getElementById('quiz-filters');
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = 'All categories';
  all.onclick = () => { activeQuizCats = new Set(CATS); applyQuizFilter(); updateQuizFilters(); };
  c.appendChild(all);
  CATS.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'filter-btn active';
    b.textContent = cat;
    b.onclick = () => {
      if (activeQuizCats.has(cat)) { if (activeQuizCats.size > 1) activeQuizCats.delete(cat); }
      else activeQuizCats.add(cat);
      applyQuizFilter(); updateQuizFilters();
    };
    c.appendChild(b);
  });
}

function updateQuizFilters() {
  const btns = document.querySelectorAll('#quiz-filters .filter-btn');
  btns[0].className = 'filter-btn' + (activeQuizCats.size === CATS.length ? ' active' : '');
  CATS.forEach((cat, i) => { btns[i + 1].className = 'filter-btn' + (activeQuizCats.has(cat) ? ' active' : ''); });
}

function applyQuizFilter() {
  filteredQ = ALL_Q.filter(q => activeQuizCats.has(q.cat));
  questions = [...filteredQ];
  scores = {}; revealed = {}; current = 0;
  document.getElementById('quiz-active').style.display = 'block';
  document.getElementById('done-screen').classList.remove('show');
  renderQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleQ() {
  questions = shuffle(filteredQ);
  scores = {}; revealed = {}; current = 0;
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('quiz-active').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  if (current >= questions.length) { showDone(); return; }
  const q = questions[current];
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-text').textContent = q.a;
  const box = document.getElementById('answer-box');
  const gr = document.getElementById('grade-row');
  if (revealed[current]) { box.classList.add('show'); gr.classList.add('show'); }
  else { box.classList.remove('show'); gr.classList.remove('show'); }
  document.getElementById('progress-text').textContent = `Question ${current + 1} of ${questions.length}`;
  const graded = Object.keys(scores).length;
  const correct = Object.values(scores).filter(Boolean).length;
  document.getElementById('score-display').textContent = `Score: ${correct} / ${graded}`;
  const pct = questions.length > 0 ? Math.round((current / questions.length) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').textContent = current === questions.length - 1 ? 'Finish' : 'Next →';
  document.getElementById('answer-input').focus();
}

function revealAnswer() {
  revealed[current] = true;
  document.getElementById('answer-box').classList.add('show');
  document.getElementById('grade-row').classList.add('show');
}

function grade(correct) { scores[current] = correct; navigate(1); }

function navigate(dir) {
  current += dir;
  if (current < 0) current = 0;
  if (current >= questions.length) { showDone(); return; }
  renderQuestion();
}

function showDone() {
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('done-screen').classList.add('show');
  const correct = Object.values(scores).filter(Boolean).length;
  const total = Object.keys(scores).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('done-num').textContent = `${correct} / ${total}`;
  document.getElementById('done-label').textContent = `${pct}% correct`;
  let msg = 'Keep studying. Denver history is weird and that\'s your competitive advantage.';
  if (pct >= 90) msg = 'You are absolutely ready. Blucifer smiles upon you.';
  else if (pct >= 75) msg = 'Solid. Brush up on sports and notable residents and you\'re set.';
  else if (pct >= 50) msg = 'Getting there. Hit the factoids tab and come back.';
  document.getElementById('done-msg').textContent = msg;
}

function restartQuiz() {
  scores = {}; revealed = {}; current = 0;
  questions = [...filteredQ];
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('quiz-active').style.display = 'block';
  renderQuestion();
}

function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0 && tab === 'facts') || (i === 1 && tab === 'quiz')));
  document.getElementById('facts').classList.toggle('active', tab === 'facts');
  document.getElementById('quiz').classList.toggle('active', tab === 'quiz');
}

document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') revealAnswer(); });

buildFactFilters();
renderFacts();
buildQuizFilters();
renderQuestion();
</script>
